<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Choferes - Expreso Diemar</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: rgba(30, 30, 30, 0.8);
            --primary: #007AFF; 
            --danger: #FF3B30;  
            --text: #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* --- FONDO CON IMAGEN DIFUMINADA --- */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('IMG_3101.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(10px) brightness(40%); /* Difuminado y oscurecido */
            transform: scale(1.1); /* Evita bordes blancos por el blur */
            z-index: -1;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 25px;
            box-sizing: border-box;
        }

        /* --- LOGO --- */
        .logo-container {
            width: 80%;
            max-width: 280px;
            margin-bottom: 50px;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- BOTONES --- */
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 85px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-ticket {
            background-color: var(--primary);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-falla {
            background-color: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--danger);
            color: var(--danger);
            backdrop-filter: blur(10px);
        }

        .footer {
            margin-top: 60px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <div class="logo-container">
            <img src="logo_diemar4.png" alt="Expreso Diemar">
        </div>

        <div class="container">
            <a href="https://diemar.app.n8n.cloud/form-test/25528953-60d1-4bcb-8385-1ca38df5aaad" class="btn btn-ticket">
                ⛽ Cargar Ticket
            </a>

            <a href="https://forms.gle/EXfCVK2XAVfzUiE86" class="btn btn-falla">
                🛠️ Reportar Falla
            </a>
        </div>

        <div class="footer">GESTIÓN DE FLOTA • EXPRESO DIEMAR</div>
    </div>

</body>
</html>
